name: 🐍 Generate Snake
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: arryansharma1
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00D4FF&color_dots[]=0d1117,1a2f5e,1f3b73,2d5a9e,58A6FF
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=0077CC&color_dots[]=ebedf0,9be9a8,40c463,30a14e,216e39

      - name: Write enhancer script
        run: |
          cat > enhance.py << 'PYEOF'
          import re

          FILTERS = (
            '<defs>'
            '<filter id="snake-glow" x="-50%" y="-50%" width="200%" height="200%">'
            '<feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur1"/>'
            '<feGaussianBlur in="SourceGraphic" stdDeviation="1.0" result="blur2"/>'
            '<feMerge>'
            '<feMergeNode in="blur1"/>'
            '<feMergeNode in="blur2"/>'
            '<feMergeNode in="SourceGraphic"/>'
            '</feMerge>'
            '</filter>'
            '<filter id="head-pulse" x="-80%" y="-80%" width="260%" height="260%">'
            '<feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="outerGlow"/>'
            '<feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="innerGlow"/>'
            '<feMerge>'
            '<feMergeNode in="outerGlow"/>'
            '<feMergeNode in="outerGlow"/>'
            '<feMergeNode in="innerGlow"/>'
            '<feMergeNode in="SourceGraphic"/>'
            '</feMerge>'
            '</filter>'
            '</defs>'
          )

          def make_css(pulse_color):
            return (
              '<style>'
              '@keyframes headPulse {'
              '0%,100% { filter: url(#head-pulse) brightness(1); }'
              '50%      { filter: url(#head-pulse) brightness(1.8); }'
              '}'
              '@keyframes bodyShimmer {'
              '0%,100% { opacity: 1; }'
              '50%      { opacity: 0.82; }'
              '}'
              '.snake-head {'
              'animation: headPulse 1.4s ease-in-out infinite;'
              'fill: ' + pulse_color + ' !important;'
              '}'
              '.snake-body {'
              'animation: bodyShimmer 2s ease-in-out infinite;'
              '}'
              '</style>'
            )

          def enhance_svg(filepath, snake_hex, is_dark):
            with open(filepath, 'r') as f:
              content = f.read()

            pulse_color = '#80EAFF' if is_dark else '#0077CC'
            inject = FILTERS + make_css(pulse_color)

            content = re.sub(
              r'(<svg\b[^>]*>)',
              r'\1' + inject,
              content, count=1
            )

            for variant in [snake_hex, snake_hex.lstrip('#')]:
              escaped = re.escape(variant)
              content = re.sub(
                r'fill="#' + escaped + r'"|fill="' + escaped + r'"',
                'fill="' + snake_hex + '" filter="url(#snake-glow)"',
                content
              )

            with open(filepath, 'w') as f:
              f.write(content)
            print('Enhanced: ' + filepath)

          enhance_svg('dist/github-contribution-grid-snake-dark.svg', '#00D4FF', True)
          enhance_svg('dist/github-contribution-grid-snake.svg', '#0077CC', False)
          PYEOF

      - name: ✨ Run enhancer
        run: python3 enhance.py

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 chore: update contribution snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
