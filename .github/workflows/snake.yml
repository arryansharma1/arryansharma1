name: 🐍 Generate Snake
on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 min — near real-time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: arryansharma1
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00D4FF&color_dots[]=0d1117,1a2f5e,1f3b73,2d5a9e,58A6FF
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=0077CC&color_dots[]=ebedf0,9be9a8,40c463,30a14e,216e39

      - name: ✨ Enhance SVGs
        run: python3 .github/scripts/enhance_snake.py

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 chore: update contribution snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
