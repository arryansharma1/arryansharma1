name: 🎬 Rotate Daily GIF
on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Pick today's GIF and update README
        run: |
          GIFS=(
            "https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif"
            "https://media.giphy.com/media/077i6AULCXc0FKTj9s/giphy.gif"
            "https://media.giphy.com/media/LmNwrBhejkK9EFP504/giphy.gif"
            "https://media.giphy.com/media/du3J3cXyzhj75IOgvA/giphy.gif"
            "https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif"
            "https://media.giphy.com/media/3oKIPtjElfqwMOTbH2/giphy.gif"
            "https://media.giphy.com/media/f3iwJFOVOwuy7K6FFw/giphy.gif"
            "https://media.giphy.com/media/26tn33aiTi1jkl6H6/giphy.gif"
            "https://media.giphy.com/media/yYSSBtDgbbRzq/giphy.gif"
            "https://media.giphy.com/media/l3q2K5jinAlChoCLS/giphy.gif"
            "https://media.giphy.com/media/qgQUggAC3Pfv684Cnr/giphy.gif"
            "https://media.giphy.com/media/3o7btNhMBytxAM6YBa/giphy.gif"
            "https://media.giphy.com/media/scZPhLqaVOM1qG4lT9/giphy.gif"
            "https://media.giphy.com/media/iIqmM5tTjmpOB9mpbn/giphy.gif"
            "https://media.giphy.com/media/LaVp0AyqR5bGsC5Cbm/giphy.gif"
            "https://media.giphy.com/media/ZVik7pBtu9dNS/giphy.gif"
            "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif"
            "https://media.giphy.com/media/26ufnwz3wDUli7GU0/giphy.gif"
            "https://media.giphy.com/media/xT9IgzoKnwFNmISR8I/giphy.gif"
            "https://media.giphy.com/media/LmNwrBhejkK9EFP8ZpN/giphy.gif"
            "https://media.giphy.com/media/RbDKaczl7HPoU0paTH/giphy.gif"
          )

          DAY=$(date +%j)
          INDEX=$(( (10#$DAY - 1) % ${#GIFS[@]} ))
          GIF="${GIFS[$INDEX]}"
          echo "📅 Day $DAY → GIF index $INDEX → $GIF"

          # Simply replace ANY giphy URL found in README — no tag matching needed
          python3 -c "
          import re
          gif = '$GIF'
          content = open('README.md').read()
          new = re.sub(r'https://media\.giphy\.com/media/[^\"\')\s]+', gif, content)
          open('README.md', 'w').write(new)
          print('✅ Updated!' if new != content else '⚠️ No giphy URL found in README at all!')
          "

      - name: Commit & push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "⚠️ Nothing to commit." || (
            git add README.md
            git commit -m "🎬 chore: rotate daily GIF [skip ci]"
            git push
            echo "✅ Pushed!"
          )
