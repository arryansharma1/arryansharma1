name: 🎬 Rotate Daily GIF
on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pick today's GIF and update README
        run: |
          GIFS=(
            "https://media.giphy.com/media/077i6AULCXc0FKTj9s/giphy.gif"
            "https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif"
            "https://media.giphy.com/media/3oKIPtjElfqwMOTbH2/giphy.gif"
            "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif"
            "https://media.giphy.com/media/xT0xem7ZlZ5CZRNiOc/giphy.gif"
            "https://media.giphy.com/media/UrkHf5bYMjBJkVDEpe/giphy.gif"
            "https://media.giphy.com/media/ZVik7pBtu9dNS/giphy.gif"
            "https://media.giphy.com/media/3og0INyCmHlNylks9O/giphy.gif"
            "https://media.giphy.com/media/Wn74RUT0vjnoU98Zdv/giphy.gif"
            "https://media.giphy.com/media/3oKIPnbKgN3bXeVpvy/giphy.gif"
            "https://media.giphy.com/media/xT9IgG6DSPTRXgDhkc/giphy.gif"
            "https://media.giphy.com/media/qgQUggAC3Pfv684Cnr/giphy.gif"
            "https://media.giphy.com/media/scZPhLqaVOM1qG4lT9/giphy.gif"
            "https://media.giphy.com/media/xT9IgzoKnwFNmISR8I/giphy.gif"
            "https://media.giphy.com/media/du3J3cXyzhj75IOgvA/giphy.gif"
            "https://media.giphy.com/media/3o7btNhMBytxAM6YBa/giphy.gif"
            "https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif"
            "https://media.giphy.com/media/26tn33aiTi1jkl6H6/giphy.gif"
            "https://media.giphy.com/media/LmNwrBhejkK9EFP8ZpN/giphy.gif"
            "https://media.giphy.com/media/APqEbxBsVlkWSuFpth/giphy.gif"
            "https://media.giphy.com/media/zOvBKUUEERdNm/giphy.gif"
            "https://media.giphy.com/media/l3q2K5jinAlChoCLS/giphy.gif"
            "https://media.giphy.com/media/26xBI73gWquCBLBDO/giphy.gif"
            "https://media.giphy.com/media/4JVTF9zR9BicshFAb7/giphy.gif"
            "https://media.giphy.com/media/iIqmM5tTjmpOB9mpbn/giphy.gif"
            "https://media.giphy.com/media/l46Cy1rHbQ92uuLXa/giphy.gif"
            "https://media.giphy.com/media/yYSSBtDgbbRzq/giphy.gif"
            "https://media.giphy.com/media/26ufnwz3wDUli7GU0/giphy.gif"
            "https://media.giphy.com/media/LaVp0AyqR5bGsC5Cbm/giphy.gif"
            "https://media.giphy.com/media/coxQHKASG60HrHtvkt/giphy.gif"
            "https://media.giphy.com/media/f3iwJFOVOwuy7K6FFw/giphy.gif"
            "https://media.giphy.com/media/RbDKaczl7HPoU0paTH/giphy.gif"
            "https://media.giphy.com/media/LmNwrBhejkK9EFP504/giphy.gif"
            "https://media.giphy.com/media/du3J3cXyzhj75IOgvA/giphy.gif"
            "https://media.giphy.com/media/26xBI73gWquCBLBDO/giphy.gif"
          )
          DAY=$(date +%j)
          INDEX=$(( (10#$DAY - 1) % ${#GIFS[@]} ))
          GIF="${GIFS[$INDEX]}"
          echo "Day $DAY → GIF index $INDEX → $GIF"

          # Use Python for safe replacement — avoids sed & escaping issues entirely
          python3 - <<EOF
          import re

          gif_url = "$GIF"
          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r'(<img\b[^>]*\balt="daily gif"[^>]*\bsrc=")[^"]*(")',
              lambda m: m.group(1) + gif_url + m.group(2),
              content
          )

          # Also handle src before alt order
          new_content = re.sub(
              r'(<img\b[^>]*\bsrc=")[^"]*("[^>]*\balt="daily gif")',
              lambda m: m.group(1) + gif_url + m.group(2),
              new_content
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print("Done! GIF updated to:", gif_url)
          EOF

      - name: Commit & push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md
            git commit -m "🎬 chore: rotate daily GIF [skip ci]"
            git push
          )
