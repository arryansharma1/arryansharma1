name: 🎬 Rotate Daily GIF
on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC = 00:00 IST (midnight Indian time)
  workflow_dispatch:          # Also lets you trigger it manually to test

jobs:
  update-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pick today's GIF and update README
        run: |
          # ── 21 funny + dev-appropriate GIFs ────────────────────────────────
          GIFS=(
            "https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif"         # 00 - cat typing furiously
            "https://media.giphy.com/media/077i6AULCXc0FKTj9s/giphy.gif"     # 01 - coffee + laptop hustle
            "https://media.giphy.com/media/LmNwrBhejkK9EFP504/giphy.gif"     # 02 - "I have no idea what I'm doing" dog
            "https://media.giphy.com/media/du3J3cXyzhj75IOgvA/giphy.gif"     # 03 - this is fine 🔥
            "https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif"    # 04 - mind blown
            "https://media.giphy.com/media/3oKIPtjElfqwMOTbH2/giphy.gif"    # 05 - thinking hard
            "https://media.giphy.com/media/f3iwJFOVOwuy7K6FFw/giphy.gif"    # 06 - cat in hoodie coding
            "https://media.giphy.com/media/26tn33aiTi1jkl6H6/giphy.gif"     # 07 - it's alive! (model trained)
            "https://media.giphy.com/media/yYSSBtDgbbRzq/giphy.gif"         # 08 - nerd glasses on
            "https://media.giphy.com/media/l3q2K5jinAlChoCLS/giphy.gif"     # 09 - matrix rain
            "https://media.giphy.com/media/qgQUggAC3Pfv684Cnr/giphy.gif"    # 10 - working at 3am
            "https://media.giphy.com/media/3o7btNhMBytxAM6YBa/giphy.gif"    # 11 - big brain activated
            "https://media.giphy.com/media/scZPhLqaVOM1qG4lT9/giphy.gif"    # 12 - debugging at 3am
            "https://media.giphy.com/media/iIqmM5tTjmpOB9mpbn/giphy.gif"    # 13 - ML math equations flying
            "https://media.giphy.com/media/LaVp0AyqR5bGsC5Cbm/giphy.gif"    # 14 - Gandalf (deadlines be like)
            "https://media.giphy.com/media/ZVik7pBtu9dNS/giphy.gif"         # 15 - frustrated dev smashing keyboard
            "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif"    # 16 - two buttons meme (classic dev dilemma)
            "https://media.giphy.com/media/26ufnwz3wDUli7GU0/giphy.gif"     # 17 - deal with it sunglasses drop
            "https://media.giphy.com/media/xT9IgzoKnwFNmISR8I/giphy.gif"    # 18 - late night grind mode
            "https://media.giphy.com/media/LmNwrBhejkK9EFP8ZpN/giphy.gif"   # 19 - "it works!" surprised
            "https://media.giphy.com/media/RbDKaczl7HPoU0paTH/giphy.gif"    # 20 - one does not simply debug
          )

          # Day of year (001–366) → pick index 0–20
          DAY=$(date +%j)
          INDEX=$(( (10#$DAY - 1) % ${#GIFS[@]} ))
          GIF="${GIFS[$INDEX]}"
          echo "Day $DAY → GIF index $INDEX → $GIF"

          # Replace ONLY the daily-gif img tag (keyed on alt="daily gif")
          sed -i 's|<img align="right" width="300" alt="daily gif" src="[^"]*"|<img align="right" width="300" alt="daily gif" src="'"$GIF"'"|' README.md

      - name: Commit & push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md
            git commit -m "🎬 chore: rotate daily GIF [skip ci]"
            git push
          )
