name: 🎬 Rotate Daily GIF
on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC = 00:00 IST (midnight Indian time)
  workflow_dispatch:

jobs:
  update-gif:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pick today's GIF and update README
        run: |
          GIFS=(
            "https://i.giphy.com/13HgwGsXF0aiGY.gif"
            "https://i.giphy.com/zOvBKUUEERdNm.gif"
            "https://i.giphy.com/LmNwrBhejkK9EFP8ZpN.gif"
            "https://i.giphy.com/077i6AULCXc0FKTj9s.gif"
            "https://i.giphy.com/du3J3cXyzhj75IOgvA.gif"
            "https://i.giphy.com/xT0xeJpnrWC4XWblEk.gif"
            "https://i.giphy.com/3oKIPtjElfqwMOTbH2.gif"
            "https://i.giphy.com/RbDKaczl7HPoU0paTH.gif"
            "https://i.giphy.com/UrkHf5bYMjBJkVDEpe.gif"
            "https://i.giphy.com/Wn74RUT0vjnoU98Zdv.gif"
            "https://i.giphy.com/qgQUggAC3Pfv684Cnr.gif"
            "https://i.giphy.com/f3iwJFOVOwuy7K6FFw.gif"
            "https://i.giphy.com/26tn33aiTi1jkl6H6.gif"
            "https://i.giphy.com/yYSSBtDgbbRzq.gif"
            "https://i.giphy.com/l3q2K5jinAlChoCLS.gif"
            "https://i.giphy.com/LmNwrBhejkK9EFP504.gif"
            "https://i.giphy.com/3o7btNhMBytxAM6YBa.gif"
            "https://i.giphy.com/scZPhLqaVOM1qG4lT9.gif"
            "https://i.giphy.com/iIqmM5tTjmpOB9mpbn.gif"
            "https://i.giphy.com/ZVik7pBtu9dNS.gif"
            "https://i.giphy.com/26ufnwz3wDUli7GU0.gif"
            "https://i.giphy.com/xT9IgzoKnwFNmISR8I.gif"
            "https://i.giphy.com/l0MYt5jPR6QX5pnqM.gif"
            "https://i.giphy.com/LaVp0AyqR5bGsC5Cbm.gif"
            "https://i.giphy.com/coxQHKASG60HrHtvkt.gif"
            "https://i.giphy.com/l46Cy1rHbQ92uuLXa.gif"
            "https://i.giphy.com/3og0INyCmHlNylks9O.gif"
            "https://i.giphy.com/xT0xem7ZlZ5CZRNiOc.gif"
            "https://i.giphy.com/APqEbxBsVlkWSuFpth.gif"
            "https://i.giphy.com/3oKIPnbKgN3bXeVpvy.gif"
            "https://i.giphy.com/26xBI73gWquCBLBDO.gif"
            "https://i.giphy.com/4JVTF9zR9BicshFAb7.gif"
            "https://i.giphy.com/xT9IgG6DSPTRXgDhkc.gif"
            "https://i.giphy.com/3ohzdIuqJoo8QdKlnW.gif"
          )

          DAY=$(date +%j)
          INDEX=$(( (10#$DAY - 1) % ${#GIFS[@]} ))
          GIF="${GIFS[$INDEX]}"
          echo "Day $DAY → GIF index $INDEX → $GIF"

          sed -i 's|<img align="right" width="300" alt="daily gif" src="[^"]*"|<img align="right" width="300" alt="daily gif" src="'"$GIF"'"|' README.md

      - name: Commit & push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md
            git commit -m "🎬 chore: rotate daily GIF [skip ci]"
            git push
          )
